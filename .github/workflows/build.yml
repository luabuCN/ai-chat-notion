name: Build and Push Docker Images (Disabled — 现已改为服务器本地构建)

# 已改为服务器本地 docker compose build，此工作流仅保留供手动使用
on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-server:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}/ai-chat-notion/server:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}/ai-chat-notion/server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'http://127.0.0.1:8080' }}
            NEXT_PUBLIC_API_ORIGIN=${{ vars.API_ORIGIN || vars.NEXT_PUBLIC_API_ORIGIN || '' }}
            NEXT_PUBLIC_HOCUSPOCUS_URL=${{ vars.NEXT_PUBLIC_HOCUSPOCUS_URL || '' }}
            API_PROXY_URL=${{ vars.API_PROXY_URL || 'http://server:4000' }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}/ai-chat-notion/web:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.owner }}/ai-chat-notion/web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # GHCR 镜像推送完成后，打 tag 触发 Dokploy（Provider 须设为 On Tag，勿用 On Push）
  deploy-trigger:
    needs: [build-server, build-web]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Push deploy tag for Dokploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa "deploy/${{ github.ref_name }}" -m "ci ok ${{ github.sha }}"
          git push origin "refs/tags/deploy/${{ github.ref_name }}" --force
