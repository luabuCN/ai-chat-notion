name: Build

on:
  push:
    branches:
      - main
      - master
      - dev
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          WEB_URL: ${{ vars.WEB_URL || 'http://localhost:3000' }}
          API_URL: ${{ vars.API_URL || 'http://localhost:4000' }}
          AUTH_SECRET: ci-build-placeholder-secret-min-32-chars
          POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/ci
