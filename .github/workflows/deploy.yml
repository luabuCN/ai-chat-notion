name: Deploy via SSH

on:
  push:
    branches:
      - main
      - master
      - dev
      - docker-local
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER || 'root' }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 110m
          script: |
            set -e
            DEPLOY_PATH="${{ vars.DEPLOY_PATH || '/opt/ai-chat-notion' }}"
            cd "$DEPLOY_PATH"
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh "${{ github.ref_name }}"
