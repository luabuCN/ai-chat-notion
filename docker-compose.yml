# 服务器本地构建部署（在 Dokploy Environment 或 .env / .env.test 填写变量）
# - 数据库和 Redis 使用远程服务，不在本地启动
# - 镜像在服务器上通过 docker compose build 直接构建，无需 GitHub Actions
# - dev / master 并行：scripts/deploy.sh 按分支选 env 文件与 COMPOSE_PROJECT_NAME，端口互不冲突
#   dev    → .env       → web 8080 / server 4000
#   master → .env.test  → web 3000 / server 5000
# - 低内存 VPS（≤4GB）：在 env 文件设 COMPOSE_PARALLEL_LIMIT=1，避免 web/server 同时构建 OOM

name: ${COMPOSE_PROJECT_NAME:-ai-chat-notion}

services:
  server:
    container_name: ai-chat-notion-server-${DEPLOY_BRANCH_SLUG:-local}
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      args:
        # 海外 VPS 默认 npm 官方源；国内构建机可设 NPM_REGISTRY=https://registry.npmmirror.com
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
    image: ai-chat-notion-server:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${SERVER_HTTP_PORT:-4000}:4000"
    env_file:
      - path: ${COMPOSE_ENV_FILE:-.env}
        required: false
    environment:
      NODE_ENV: production
      AUTH_SECRET: ${AUTH_SECRET}
      POSTGRES_URL: ${POSTGRES_URL}
      REDIS_URL: ${REDIS_URL}
      API_AUTH_SECRET: ${API_AUTH_SECRET:-}
      SERVER_HTTP_PORT: 4000
      SERVER_COLLAB_PATH: ${SERVER_COLLAB_PATH:-/collab}
      WEB_ORIGIN: ${NEXT_PUBLIC_APP_URL:-http://127.0.0.1:8080}
      API_ORIGIN: ${API_ORIGIN:-http://127.0.0.1:4000}
      NEXT_PUBLIC_API_ORIGIN: ${API_ORIGIN:-http://127.0.0.1:4000}
      API_KEY: ${API_KEY:-}
      MODELSCOPE_API_KEY: ${MODELSCOPE_API_KEY:-}
      UPLOADTHING_SECRET: ${UPLOADTHING_SECRET:-}
      TZ: ${TZ:-Asia/Shanghai}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:'+(process.env.SERVER_HTTP_PORT||4000)+'/ping').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    container_name: ai-chat-notion-web-${DEPLOY_BRANCH_SLUG:-local}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
        # 3GB VPS + swap 用 2048；仍 OOM 加 swap 或试 2560，勿超过可用 RAM（3584 在 3GB 机器必 OOM）
        NODE_BUILD_HEAP_MB: ${NODE_BUILD_HEAP_MB:-2048}
        # NEXT_PUBLIC_* 在 next build 时写入客户端 bundle，必须在构建时注入
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://127.0.0.1:8080}
        NEXT_PUBLIC_API_ORIGIN: ${API_ORIGIN:-http://127.0.0.1:4000}
        NEXT_PUBLIC_HOCUSPOCUS_URL: ${NEXT_PUBLIC_HOCUSPOCUS_URL:-ws://127.0.0.1:4000/collab}
        # API 代理目标 —— rewrites() 在构建时求值，必须在 build 前注入
        API_PROXY_URL: ${API_PROXY_URL:-http://server:4000}
    image: ai-chat-notion-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:8080"
    env_file:
      - path: ${COMPOSE_ENV_FILE:-.env}
        required: false
    environment:
      NODE_ENV: production
      AUTH_SECRET: ${AUTH_SECRET}
      POSTGRES_URL: ${POSTGRES_URL}
      REDIS_URL: ${REDIS_URL}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://127.0.0.1:8080}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://127.0.0.1:8080}
      NEXT_PUBLIC_HOCUSPOCUS_URL: ${NEXT_PUBLIC_HOCUSPOCUS_URL:-ws://127.0.0.1:4000/collab}
      NEXT_PUBLIC_API_ORIGIN: ${API_ORIGIN:-http://127.0.0.1:4000}
      # Route Handler 流式代理目标（运行时读取，与 next.config rewrites 一致）
      API_PROXY_URL: ${API_PROXY_URL:-http://server:4000}
      PORT: 8080
      API_KEY: ${API_KEY:-}
      MODELSCOPE_API_KEY: ${MODELSCOPE_API_KEY:-}
      UPLOADTHING_SECRET: ${UPLOADTHING_SECRET:-}
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID:-}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      TZ: ${TZ:-Asia/Shanghai}
    depends_on:
      - server
