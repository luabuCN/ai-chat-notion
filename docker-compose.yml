# Dokploy Compose 部署（在面板 Environment 填写变量，部署时生成 .env）
# - compose 用 ${VAR} 做替换；容器内变量见各服务 environment / env_file
# - 域名：Dokploy → Domains → web 容器端口 3000，server 容器端口 4000
# - NEXT_PUBLIC_* 在构建 Web 镜像时打入，修改后需重新 Deploy
# 本地全栈（含 Postgres/Redis）:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d --build

name: ai-chat-notion

x-auth-secret: &auth-secret
  AUTH_SECRET: ${AUTH_SECRET:-dev-docker-local-auth-secret-min-32-characters}

# Dokploy 托管库请直接填完整连接串；本地合并 docker-compose.local.yml 时可用默认 postgres/redis 主机名
x-database-url: &database-url
  POSTGRES_URL: ${POSTGRES_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ai_chat_notion}}

x-redis-url: &redis-url
  REDIS_URL: ${REDIS_URL:-redis://:${REDIS_PASSWORD:-redis}@redis:6379}

services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    expose:
      - "4000"
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      <<: [*database-url, *redis-url, *auth-secret]
      API_AUTH_SECRET: ${API_AUTH_SECRET:-}
      SERVER_HTTP_PORT: 4000
      SERVER_COLLAB_PATH: ${SERVER_COLLAB_PATH:-/collab}
      WEB_ORIGIN: ${NEXT_PUBLIC_APP_URL:-http://127.0.0.1:3000}
      API_ORIGIN: ${API_ORIGIN:-http://127.0.0.1:4000}
      NEXT_PUBLIC_API_ORIGIN: ${API_ORIGIN:-http://127.0.0.1:4000}
      API_KEY: ${API_KEY:-}
      MODELSCOPE_API_KEY: ${MODELSCOPE_API_KEY:-}
      UPLOADTHING_SECRET: ${UPLOADTHING_SECRET:-}
      TZ: ${TZ:-Asia/Shanghai}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:'+(process.env.SERVER_HTTP_PORT||4000)+'/ping').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_HOCUSPOCUS_URL: ${NEXT_PUBLIC_HOCUSPOCUS_URL:-ws://127.0.0.1:4000/collab}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://127.0.0.1:3000}
        POSTGRES_URL: ${POSTGRES_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-ai_chat_notion}}
        AUTH_SECRET: ${AUTH_SECRET:-build-time-placeholder-secret-min-32-chars}
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      <<: [*database-url, *redis-url, *auth-secret]
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://127.0.0.1:3000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://127.0.0.1:3000}
      NEXT_PUBLIC_HOCUSPOCUS_URL: ${NEXT_PUBLIC_HOCUSPOCUS_URL:-ws://127.0.0.1:4000/collab}
      NEXT_PUBLIC_API_ORIGIN: ${API_ORIGIN:-http://127.0.0.1:4000}
      API_KEY: ${API_KEY:-}
      MODELSCOPE_API_KEY: ${MODELSCOPE_API_KEY:-}
      UPLOADTHING_SECRET: ${UPLOADTHING_SECRET:-}
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID:-}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      TZ: ${TZ:-Asia/Shanghai}
    depends_on:
      server:
        condition: service_healthy
