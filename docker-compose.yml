# Dokploy Compose 部署（在 Dokploy Environment 填写变量）
# - 数据库和 Redis 使用远程服务，不在本地启动
# - 镜像由 GitHub Actions 构建并推送到 GHCR，Dokploy 仅拉取镜像
# - 域名：Dokploy → Domains → web 容器端口 8080，server 容器端口 4000

name: ai-chat-notion

services:
  server:
    image: ghcr.io/${GHCR_OWNER:-luabucn}/ai-chat-notion/server:${IMAGE_TAG:-dev}
    restart: unless-stopped
    ports:
      - "${SERVER_HTTP_PORT:-4000}:4000"
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      AUTH_SECRET: ${AUTH_SECRET}
      POSTGRES_URL: ${POSTGRES_URL}
      REDIS_URL: ${REDIS_URL}
      API_AUTH_SECRET: ${API_AUTH_SECRET:-}
      SERVER_HTTP_PORT: 4000
      SERVER_COLLAB_PATH: ${SERVER_COLLAB_PATH:-/collab}
      WEB_ORIGIN: ${NEXT_PUBLIC_APP_URL:-http://127.0.0.1:8080}
      API_ORIGIN: ${API_ORIGIN:-http://127.0.0.1:4000}
      NEXT_PUBLIC_API_ORIGIN: ${API_ORIGIN:-http://127.0.0.1:4000}
      API_KEY: ${API_KEY:-}
      MODELSCOPE_API_KEY: ${MODELSCOPE_API_KEY:-}
      UPLOADTHING_SECRET: ${UPLOADTHING_SECRET:-}
      TZ: ${TZ:-Asia/Shanghai}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:'+(process.env.SERVER_HTTP_PORT||4000)+'/ping').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    image: ghcr.io/${GHCR_OWNER:-luabucn}/ai-chat-notion/web:${IMAGE_TAG:-dev}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:8080"
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      AUTH_SECRET: ${AUTH_SECRET}
      POSTGRES_URL: ${POSTGRES_URL}
      REDIS_URL: ${REDIS_URL}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://127.0.0.1:8080}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://127.0.0.1:8080}
      NEXT_PUBLIC_HOCUSPOCUS_URL: ${NEXT_PUBLIC_HOCUSPOCUS_URL:-ws://127.0.0.1:4000/collab}
      NEXT_PUBLIC_API_ORIGIN: ${API_ORIGIN:-http://127.0.0.1:4000}
      PORT: 8080
      API_KEY: ${API_KEY:-}
      MODELSCOPE_API_KEY: ${MODELSCOPE_API_KEY:-}
      UPLOADTHING_SECRET: ${UPLOADTHING_SECRET:-}
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID:-}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      TZ: ${TZ:-Asia/Shanghai}
    depends_on:
      server:
        condition: service_healthy
